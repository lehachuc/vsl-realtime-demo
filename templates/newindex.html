<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hệ Thống Nhận Diện VSL</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.5/socket.io.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/holistic/holistic.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    
    <style>
        :root {
            /* Bảng màu dịu mắt (Soft Palette) */
            --bg-body: #f0f4f8;          /* Xám xanh rất nhạt làm nền */
            --bg-card: #ffffff;          /* Trắng cho các khung nội dung */
            --primary: #3b82f6;          /* Xanh dương dịu */
            --primary-dark: #1d4ed8;     /* Xanh đậm cho text header */
            --text-main: #334155;        /* Xám đậm cho chữ (không dùng đen tuyền) */
            --text-light: #64748b;       /* Xám nhạt cho phụ đề */
            --accent-yellow: #f59e0b;    /* Vàng cho trạng thái chuẩn bị */
            --accent-red: #ef4444;       /* Đỏ cho trạng thái ghi hình */
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        }

        body {
            font-family: 'Roboto', sans-serif;
            background-color: var(--bg-body);
            color: var(--text-main);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        /* --- HEADER --- */
        header {
            background-color: var(--bg-card);
            width: 100%;
            padding: 20px 0;
            box-shadow: var(--shadow);
            text-align: center;
            margin-bottom: 30px;
            border-bottom: 4px solid var(--primary);
        }

        header h1 {
            margin: 0;
            font-size: 1.8rem;
            color: var(--primary-dark);
            font-weight: 700;
        }

        header p {
            margin: 8px 0 0;
            font-size: 1rem;
            color: var(--text-light);
        }

        /* --- MAIN LAYOUT --- */
        .main-container {
            width: 90%;
            max-width: 800px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        /* --- VIDEO CARD --- */
        .card {
            background: var(--bg-card);
            padding: 15px;
            border-radius: 16px;
            box-shadow: var(--shadow);
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .video-wrapper {
            position: relative;
            width: 100%;
            max-width: 640px;
            aspect-ratio: 4/3;
            border-radius: 12px;
            overflow: hidden;
            background: #e2e8f0; /* Màu nền giữ chỗ khi cam chưa lên */
        }

        #webcam {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: scaleX(-1);
        }

        #output_canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            transform: scaleX(-1);
        }

        /* --- OVERLAYS & STATUS --- */
        #status-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.3); /* Làm tối nhẹ nền video */
            backdrop-filter: blur(2px);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
            opacity: 0;
            transition: opacity 0.3s ease;
            pointer-events: none;
        }

        #status-overlay.visible {
            opacity: 1;
        }

        #status-timer {
            font-size: 5rem;
            font-weight: 700;
            color: white;
            text-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }

        #status-message {
            font-size: 1.5rem;
            font-weight: 500;
            color: white;
            margin-top: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
            background: rgba(0,0,0,0.5);
            padding: 5px 15px;
            border-radius: 20px;
        }

        /* Hiệu ứng viền nhấp nháy khi ghi hình */
        @keyframes pulse-border {
            0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.4); }
            70% { box-shadow: 0 0 0 10px rgba(239, 68, 68, 0); }
            100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); }
        }

        .recording-mode {
            border: 3px solid var(--accent-red);
            animation: pulse-border 2s infinite;
        }

        /* --- LOADING SPINNER --- */
        .spinner {
            width: 50px;
            height: 50px;
            border: 5px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 1s ease-in-out infinite;
            margin-bottom: 15px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* --- RESULT SECTION --- */
        .result-container {
            width: 100%;
            max-width: 640px;
            text-align: center;
            margin-top: 10px;
        }

        .result-label {
            font-size: 0.9rem;
            color: var(--text-light);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
        }

        .result-box {
            background: var(--bg-card);
            padding: 20px;
            border-radius: 12px;
            box-shadow: var(--shadow);
            border-left: 5px solid var(--primary);
            min-height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #final-prediction-text {
            font-size: 2rem;
            font-weight: 700;
            color: var(--primary-dark);
            margin: 0;
        }

        /* --- FOOTER --- */
        footer {
            margin-top: auto;
            padding: 20px;
            font-size: 0.85rem;
            color: var(--text-light);
        }
    </style>
</head>
<body>

    <header>
        <h1>Nhận Diện Ngôn Ngữ Ký Hiệu</h1>
        <p>Hệ thống AI hỗ trợ người khiếm thính</p>
    </header>

    <div class="main-container">
        <div class="card">
            <div class="video-wrapper" id="video-wrapper">
                <video id="webcam" autoplay playsinline></video>
                <canvas id="output_canvas" width="640" height="480"></canvas>
                
                <div id="status-overlay">
                    <div id="loading-spinner" class="spinner" style="display: none;"></div>
                    <div id="status-timer"></div>
                    <div id="status-message"></div>
                </div>
            </div>
        </div>

        <div class="result-container">
            <div class="result-label">Kết quả nhận diện</div>
            <div class="result-box">
                <p id="final-prediction-text">...</p>
            </div>
        </div>
    </div>

    <footer>
        © 2025 Demo Project by Group 3 - Vietnamese Sign Language (VSL)
    </footer>

    <script>
        // === DOM ELEMENTS ===
        const videoElement = document.getElementById('webcam');
        const canvasElement = document.getElementById('output_canvas');
        const canvasCtx = canvasElement.getContext('2d');
        const predictionText = document.getElementById('final-prediction-text');
        
        const videoWrapper = document.getElementById('video-wrapper');
        const statusOverlay = document.getElementById('status-overlay');
        const statusTimer = document.getElementById('status-timer');
        const statusMessage = document.getElementById('status-message');
        const loadingSpinner = document.getElementById('loading-spinner');

        // === SOCKET CONNECTION ===
        const socket = io.connect(location.protocol + '//' + document.domain + ':' + location.port, {
            transports: ['websocket'] 
        });

        socket.on('connect', () => {
            console.log('✅ Socket connected successfully!');
        });

        // === XỬ LÝ TRẠNG THÁI ===
        socket.on('status', (data) => {
            let state = data.state;
            
            // Reset UI
            videoWrapper.classList.remove('recording-mode');
            loadingSpinner.style.display = 'none';
            statusTimer.style.display = 'block';

            if (state === 'IDLE') {
                statusOverlay.classList.remove('visible');
            } 
            else if (state === 'COUNTDOWN') {
                statusMessage.textContent = 'CHUẨN BỊ';
                statusMessage.style.color = '#fbbf24'; // Vàng
                statusTimer.textContent = data.time;
                statusOverlay.classList.add('visible');
            } 
            else if (state === 'RECORDING') {
                statusMessage.textContent = 'ĐANG GHI HÌNH';
                statusMessage.style.color = '#ef4444'; // Đỏ
                statusTimer.textContent = data.time;
                statusOverlay.classList.add('visible');
                
                videoWrapper.classList.add('recording-mode');
                predictionText.textContent = "..."; // Xóa kết quả cũ
            } 
            else if (state === 'PREDICTING') {
                statusMessage.textContent = 'ĐANG XỬ LÝ...';
                statusMessage.style.color = '#fff';
                statusTimer.style.display = 'none';
                loadingSpinner.style.display = 'block';
                statusOverlay.classList.add('visible');
            }
        });

        // === NHẬN KẾT QUẢ ===
        socket.on('prediction', (data) => {
            predictionText.textContent = data.sentence;
            // Hiệu ứng "blink" nhẹ khi có kết quả mới
            predictionText.style.transform = "scale(1.1)";
            predictionText.style.transition = "transform 0.2s";
            setTimeout(() => {
                predictionText.style.transform = "scale(1)";
            }, 200);
        });

        // === MEDIAPIPE LOGIC ===
        function extractKeypointsJS(results) {
            const lh = results.leftHandLandmarks ? results.leftHandLandmarks.flatMap(res => [res.x, res.y, res.z]) : new Array(21 * 3).fill(0);
            const rh = results.rightHandLandmarks ? results.rightHandLandmarks.flatMap(res => [res.x, res.y, res.z]) : new Array(21 * 3).fill(0);
            return lh.concat(rh);
        }

        function onResults(results) {
            canvasCtx.save();
            canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
            canvasCtx.drawImage(results.image, 0, 0, canvasElement.width, canvasElement.height);
            
            // Vẽ xương tay với màu dịu hơn
            if (results.leftHandLandmarks) {
                drawConnectors(canvasCtx, results.leftHandLandmarks, HAND_CONNECTIONS, {color: 'rgba(255, 255, 255, 0.7)', lineWidth: 2});
                drawLandmarks(canvasCtx, results.leftHandLandmarks, {color: '#ef4444', lineWidth: 1, radius: 2});
            }
            if (results.rightHandLandmarks) {
                drawConnectors(canvasCtx, results.rightHandLandmarks, HAND_CONNECTIONS, {color: 'rgba(255, 255, 255, 0.7)', lineWidth: 2});
                drawLandmarks(canvasCtx, results.rightHandLandmarks, {color: '#ef4444', lineWidth: 1, radius: 2});
            }
            canvasCtx.restore();

            const keypoints = extractKeypointsJS(results);
            socket.emit('keypoints', { keypoints: keypoints });
        }

        const holistic = new Holistic({locateFile: (file) => {
            return `https://cdn.jsdelivr.net/npm/@mediapipe/holistic/${file}`;
        }});
        holistic.setOptions({
            modelComplexity: 1,
            smoothLandmarks: true,
            minDetectionConfidence: 0.5,
            minTrackingConfidence: 0.5
        });
        holistic.onResults(onResults);

        const camera = new Camera(videoElement, {
            onFrame: async () => {
                await holistic.send({image: videoElement});
            },
            width: 640,
            height: 480
        });
        
        camera.start(); 
    </script>
</body>
</html>
